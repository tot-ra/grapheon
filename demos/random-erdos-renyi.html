<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grapheon - Random Erdős-Rényi (Worker + WebGL)</title>
  <style>
    body { margin: 0; font-family: "Avenir Next", "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }
    .layout { display: grid; grid-template-columns: 310px 1fr; height: 100vh; }
    .panel { padding: 16px; border-right: 1px solid #e2e8f0; background: #fff; }
    h1 { margin: 0 0 8px; font-size: 1.05rem; }
    label { display: block; font-size: 0.82rem; color: #334155; margin-top: 10px; }
    input, button { width: 100%; margin-top: 4px; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; }
    button { border: none; background: #0284c7; color: #fff; font-weight: 700; cursor: pointer; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .meta { margin-top: 10px; font-size: 0.8rem; color: #64748b; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="panel">
    <h1>Random Erdős-Rényi</h1>
    <label>Nodes <input id="nodes" type="number" value="25000" min="1000" max="120000" step="1000"></label>
    <label>Edges <input id="edges" type="number" value="40000" min="1000" max="240000" step="1000"></label>
    <label>Workers <input id="workers" type="number" value="30" min="1" max="64" step="1"></label>
    <div class="row">
      <button id="regen">Rebuild</button>
      <button id="toggle">Pause</button>
    </div>
    <div class="meta" id="stats">ready</div>
  </aside>
  <main><canvas id="canvas" width="1280" height="800"></canvas></main>
</div>

<script>
(async () => {
  const stats = document.getElementById("stats");
  if (window.location.protocol === "file:") {
    stats.textContent = "Open via local server: python3 -m http.server 8080 then http://localhost:8080/demos/random-erdos-renyi.html";
    return;
  }

  let ForceGraphWorkerClient, ForceGraphWorkerPoolClient, WebGLForceGraphRenderer, CanvasPanZoomController;
  try {
    ({ ForceGraphWorkerClient, ForceGraphWorkerPoolClient, WebGLForceGraphRenderer, CanvasPanZoomController } = await import("../dist/index.js"));
  } catch {
    stats.textContent = "dist/index.js not found. Run: npm run build from repo root.";
    return;
  }

  const canvas = document.getElementById("canvas");
  const renderer = new WebGLForceGraphRenderer(canvas);
  const nodesEl = document.getElementById("nodes");
  const edgesEl = document.getElementById("edges");
  const workersEl = document.getElementById("workers");
  const regenEl = document.getElementById("regen");
  const toggleEl = document.getElementById("toggle");
  const initialScale = 0.62;
  const camera = new CanvasPanZoomController(canvas, {
    initialScale,
    initialOffsetX: canvas.width / (2 * initialScale),
    initialOffsetY: canvas.height / (2 * initialScale),
    minScale: 0.04,
    maxScale: 10,
  });

  let running = true;
  let engine = null;
  let last = performance.now();
  function isExpectedTermination(error) {
    return String(error).includes("Worker terminated");
  }

  async function createEngine() {
    if (engine) engine.terminate();
    const wc = Math.max(1, Number(workersEl.value) || 1);
    engine = wc === 1 ? new ForceGraphWorkerClient() : new ForceGraphWorkerPoolClient(wc);
    await engine.init({ repulsionStrength: 26, springLength: 8, springStrength: 0.03, damping: 0.92, theta: 1 });
  }

  function makeGraphData(n, e) {
    const positions = new Float32Array(n * 2);
    const row = Math.ceil(Math.sqrt(n));
    for (let i = 0; i < n; i += 1) {
      positions[i * 2] = (i % row) - row / 2;
      positions[i * 2 + 1] = Math.floor(i / row) - row / 2;
    }

    const maxUndirectedEdges = Math.floor((n * (n - 1)) / 2);
    const targetEdges = Math.max(0, Math.min(e, maxUndirectedEdges));
    const edges = new Uint32Array(targetEdges * 2);
    const used = new Set();

    let i = 0;
    while (i < targetEdges) {
      const a = Math.floor(Math.random() * n);
      let b = Math.floor(Math.random() * n);
      if (a === b) {
        continue;
      }

      let low = a;
      let high = b;
      if (low > high) {
        low = b;
        high = a;
      }

      const key = low * n + high;
      if (used.has(key)) {
        continue;
      }
      used.add(key);

      edges[i * 2] = low;
      edges[i * 2 + 1] = high;
      i += 1;
    }

    return { positions, edges, targetEdges, maxUndirectedEdges };
  }

  async function rebuild() {
    stats.textContent = "building...";
    await createEngine();
    const n = Number(nodesEl.value);
    const e = Number(edgesEl.value);
    const data = makeGraphData(n, e);
    const loaded = await engine.loadGraph(n, data.edges, data.positions);
    stats.textContent = `${loaded.nodeCount.toLocaleString()} nodes, ${loaded.edgeCount.toLocaleString()} edges loaded`;
    if (data.targetEdges < e) {
      stats.textContent += ` (clamped to max ${data.maxUndirectedEdges.toLocaleString()})`;
    }
  }

  async function frame() {
    if (running && engine) {
      try {
        const summary = await engine.step(1);
        const snapshot = await engine.snapshot(45000, 40000);
        const view = camera.getTransform();
        renderer.drawSnapshot(snapshot, {
          width: canvas.width,
          height: canvas.height,
          offsetX: view.offsetX,
          offsetY: view.offsetY,
          scale: view.scale,
          nodeRadius: 2,
          nodeColor: "#0f172a",
          edgeColor: "#64748b88",
          backgroundColor: "#f8fafc",
          drawEdges: true,
        });
        const now = performance.now();
        const frameMs = now - last;
        last = now;
        stats.textContent = `workers ${workersEl.value} | active ${summary.activeNodeCount.toLocaleString()} | theta ${summary.theta.toFixed(2)} | frame ${frameMs.toFixed(1)}ms`;
      } catch (error) {
        if (!isExpectedTermination(error)) {
          stats.textContent = String(error);
        }
      }
    }
    requestAnimationFrame(frame);
  }

  regenEl.addEventListener("click", () => rebuild().catch((e) => { stats.textContent = String(e); }));
  toggleEl.addEventListener("click", () => { running = !running; toggleEl.textContent = running ? "Pause" : "Resume"; });

  await rebuild();
  frame();
})();
</script>
</body>
</html>
