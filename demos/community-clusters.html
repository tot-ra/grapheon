<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grapheon - Community Clusters (Worker + WebGL)</title>
  <style>
    body { margin: 0; font-family: "Avenir Next", "Segoe UI", sans-serif; background: #f8fafc; }
    .layout { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
    .top { display: grid; grid-template-columns: repeat(6, minmax(120px, 1fr)); gap: 10px; align-items: end; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e2e8f0; }
    .top label { font-size: 0.8rem; color: #334155; }
    .top input, .top button { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 4px; }
    .top button { border: none; background: #0891b2; color: #fff; font-weight: 700; cursor: pointer; }
    .meta { font-size: 0.82rem; color: #64748b; padding: 0 16px 12px; background: #fff; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
<div class="layout">
  <div>
    <div class="top">
      <label>Communities <input id="communities" type="number" value="8" min="2" max="20"></label>
      <label>Nodes/Community <input id="nodesPerCommunity" type="number" value="4000" min="200" max="20000" step="200"></label>
      <label>Bridge Ratio <input id="bridge" type="number" value="0.02" min="0.001" max="0.2" step="0.001"></label>
      <label>Workers <input id="workers" type="number" value="30" min="1" max="64" step="1"></label>
      <button id="rebuild">Rebuild</button>
      <button id="pause">Pause</button>
    </div>
    <div class="meta" id="meta">ready</div>
  </div>
  <canvas id="canvas" width="1400" height="860"></canvas>
</div>

<script>
(async () => {
  const meta = document.getElementById("meta");
  if (window.location.protocol === "file:") {
    meta.textContent = "Open via local server: python3 -m http.server 8080 then http://localhost:8080/demos/community-clusters.html";
    return;
  }

  let ForceGraphWorkerClient, ForceGraphWorkerPoolClient, WebGLForceGraphRenderer, CanvasPanZoomController;
  try {
    ({ ForceGraphWorkerClient, ForceGraphWorkerPoolClient, WebGLForceGraphRenderer, CanvasPanZoomController } = await import("../dist/index.js"));
  } catch {
    meta.textContent = "dist/index.js not found. Run: npm run build from repo root.";
    return;
  }

  const canvas = document.getElementById("canvas");
  const renderer = new WebGLForceGraphRenderer(canvas);
  const communitiesEl = document.getElementById("communities");
  const nodesPerCommunityEl = document.getElementById("nodesPerCommunity");
  const bridgeEl = document.getElementById("bridge");
  const workersEl = document.getElementById("workers");
  const rebuildEl = document.getElementById("rebuild");
  const pauseEl = document.getElementById("pause");
  const initialScale = 0.8;
  const camera = new CanvasPanZoomController(canvas, {
    initialScale,
    initialOffsetX: canvas.width / (2 * initialScale),
    initialOffsetY: canvas.height / (2 * initialScale),
    minScale: 0.04,
    maxScale: 10,
  });

  let engine = null;
  let running = true;
  let last = performance.now();
  function isExpectedTermination(error) {
    return String(error).includes("Worker terminated");
  }

  async function createEngine() {
    if (engine) engine.terminate();
    const wc = Math.max(1, Number(workersEl.value) || 1);
    engine = wc === 1 ? new ForceGraphWorkerClient() : new ForceGraphWorkerPoolClient(wc);
    await engine.init({ repulsionStrength: 20, springLength: 7, springStrength: 0.03, damping: 0.92, theta: 1 });
  }

  function makeData(communities, perCommunity, bridgeRatio) {
    const nodeCount = communities * perCommunity;
    const intra = nodeCount;
    const bridges = Math.floor(nodeCount * bridgeRatio);
    const edgeCount = intra + bridges;

    const positions = new Float32Array(nodeCount * 2);
    let idx = 0;
    for (let c = 0; c < communities; c += 1) {
      const cx = (c - communities / 2) * 120;
      for (let i = 0; i < perCommunity; i += 1) {
        positions[idx * 2] = cx + (Math.random() - 0.5) * 35;
        positions[idx * 2 + 1] = (Math.random() - 0.5) * 90;
        idx += 1;
      }
    }

    const edges = new Uint32Array(edgeCount * 2);
    let k = 0;
    for (let c = 0; c < communities; c += 1) {
      const start = c * perCommunity;
      for (let i = 0; i < perCommunity; i += 1) {
        const a = start + i;
        const b = start + ((i * 7 + 11) % perCommunity);
        edges[k++] = a;
        edges[k++] = b;
      }
    }

    for (let i = 0; i < bridges; i += 1) {
      const a = Math.floor(Math.random() * nodeCount);
      const b = Math.floor(Math.random() * nodeCount);
      edges[k++] = a;
      edges[k++] = b;
    }

    return { nodeCount, edges, positions };
  }

  async function rebuild() {
    meta.textContent = "building...";
    await createEngine();
    const data = makeData(Number(communitiesEl.value), Number(nodesPerCommunityEl.value), Number(bridgeEl.value));
    const loaded = await engine.loadGraph(data.nodeCount, data.edges, data.positions);
    meta.textContent = `${loaded.nodeCount.toLocaleString()} nodes, ${loaded.edgeCount.toLocaleString()} edges loaded`;
  }

  async function draw() {
    if (running && engine) {
      try {
        const s = await engine.step(1);
        const snap = await engine.snapshot(70000, 70000);
        const view = camera.getTransform();
        renderer.drawSnapshot(snap, {
          width: canvas.width,
          height: canvas.height,
          offsetX: view.offsetX,
          offsetY: view.offsetY,
          scale: view.scale,
          nodeRadius: 2,
          nodeColor: "#111827",
          edgeColor: "#1e40af66",
          backgroundColor: "#f8fafc",
          drawEdges: true,
        });
        const now = performance.now();
        const ms = now - last;
        last = now;
        meta.textContent = `workers ${workersEl.value} | active ${s.activeNodeCount.toLocaleString()} | theta ${s.theta.toFixed(2)} | frame ${ms.toFixed(1)}ms`;
      } catch (error) {
        if (!isExpectedTermination(error)) {
          meta.textContent = String(error);
        }
      }
    }
    requestAnimationFrame(draw);
  }

  rebuildEl.addEventListener("click", () => rebuild().catch((e) => { meta.textContent = String(e); }));
  pauseEl.addEventListener("click", () => { running = !running; pauseEl.textContent = running ? "Pause" : "Resume"; });

  await rebuild();
  draw();
})();
</script>
</body>
</html>
