<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grapheon - 100k+ Scale (Worker + WebGL)</title>
  <style>
    body { margin: 0; font-family: "Avenir Next", "Segoe UI", sans-serif; background: #f8fafc; }
    .bar { display: flex; gap: 10px; align-items: center; padding: 10px 14px; border-bottom: 1px solid #e2e8f0; background: #fff; flex-wrap: wrap; }
    .bar label { font-size: 0.8rem; color: #334155; }
    .bar input, .bar button { padding: 7px 9px; border-radius: 8px; border: 1px solid #cbd5e1; }
    .bar button { cursor: pointer; border: none; background: #0369a1; color: #fff; font-weight: 700; }
    #status { font-size: 0.82rem; color: #64748b; }
    canvas { width: 100vw; height: calc(100vh - 58px); display: block; }
  </style>
</head>
<body>
  <div class="bar">
    <label>Nodes <input id="nodes" type="number" value="120000" min="100000" max="300000" step="10000"></label>
    <label>Edges <input id="edges" type="number" value="130000" min="100000" max="400000" step="10000"></label>
    <label>Workers <input id="workers" type="number" value="30" min="1" max="64" step="1"></label>
    <button id="build">Reset Graph</button>
    <button id="resetView">Reset View</button>
    <button id="toggle">Pause</button>
    <span id="status">ready</span>
  </div>
  <canvas id="canvas" width="1600" height="900"></canvas>

<script>
(async () => {
  const status = document.getElementById("status");
  if (window.location.protocol === "file:") {
    status.textContent = "Open via local server: python3 -m http.server 8080 then http://localhost:8080/demos/large-scale-100k.html";
    return;
  }

  let ForceGraphWorkerClient, ForceGraphWorkerPoolClient, WebGLForceGraphRenderer, CanvasPanZoomController;
  try {
    ({ ForceGraphWorkerClient, ForceGraphWorkerPoolClient, WebGLForceGraphRenderer, CanvasPanZoomController } = await import("../dist/index.js"));
  } catch {
    status.textContent = "dist/index.js not found. Run: npm run build from repo root.";
    return;
  }

  const canvas = document.getElementById("canvas");
  const renderer = new WebGLForceGraphRenderer(canvas);
  const nodesEl = document.getElementById("nodes");
  const edgesEl = document.getElementById("edges");
  const workersEl = document.getElementById("workers");
  const buildEl = document.getElementById("build");
  const resetViewEl = document.getElementById("resetView");
  const toggleEl = document.getElementById("toggle");
  const initialScale = 0.6;
  const initialOffsetX = canvas.width / (2 * initialScale);
  const initialOffsetY = canvas.height / (2 * initialScale);
  const camera = new CanvasPanZoomController(canvas, {
    initialScale,
    initialOffsetX,
    initialOffsetY,
    minScale: 0.04,
    maxScale: 10,
  });

  let engine = null;
  let running = true;
  let last = performance.now();
  function isExpectedTermination(error) {
    return String(error).includes("Worker terminated");
  }

  async function createEngine() {
    if (engine) engine.terminate();
    const wc = Math.max(1, Number(workersEl.value) || 1);
    engine = wc === 1 ? new ForceGraphWorkerClient() : new ForceGraphWorkerPoolClient(wc);
    await engine.init({ repulsionStrength: 22, springLength: 8, springStrength: 0.03, damping: 0.92, theta: 1, maxSpeed: 4 });
  }

  function makeData(nodeCount, edgeCount) {
    const positions = new Float32Array(nodeCount * 2);
    const row = Math.ceil(Math.sqrt(nodeCount));
    for (let i = 0; i < nodeCount; i += 1) {
      positions[i * 2] = (i % row) - row / 2;
      positions[i * 2 + 1] = Math.floor(i / row) - row / 2;
    }

    const edges = new Uint32Array(edgeCount * 2);
    for (let i = 0; i < edgeCount; i += 1) {
      edges[i * 2] = i % nodeCount;
      edges[i * 2 + 1] = (i * 13 + 97) % nodeCount;
    }
    return { positions, edges };
  }

  async function buildLargeGraph() {
    status.textContent = "building...";
    await createEngine();
    const nodeCount = Number(nodesEl.value);
    const edgeCount = Number(edgesEl.value);
    const data = makeData(nodeCount, edgeCount);
    const loaded = await engine.loadGraph(nodeCount, data.edges, data.positions);
    status.textContent = `${loaded.nodeCount.toLocaleString()} nodes loaded (${workersEl.value} workers)`;
  }

  function resetView() {
    camera.setTransform({
      scale: initialScale,
      offsetX: initialOffsetX,
      offsetY: initialOffsetY,
    });
  }

  async function animate() {
    if (running && engine) {
      try {
        const summary = await engine.step(1);
        const snap = await engine.snapshot(70000, 65000);
        const view = camera.getTransform();
        renderer.drawSnapshot(snap, {
          width: canvas.width,
          height: canvas.height,
          offsetX: view.offsetX,
          offsetY: view.offsetY,
          scale: view.scale,
          nodeRadius: 2,
          nodeColor: "#0f172a",
          edgeColor: "#0284c75a",
          backgroundColor: "#f8fafc",
          drawEdges: true,
        });

        const now = performance.now();
        const ms = now - last;
        last = now;
        status.textContent = `workers ${workersEl.value} | active ${summary.activeNodeCount.toLocaleString()} | theta ${summary.theta.toFixed(2)} | frame ${ms.toFixed(1)}ms`;
      } catch (error) {
        if (!isExpectedTermination(error)) {
          status.textContent = String(error);
        }
      }
    }

    requestAnimationFrame(animate);
  }

  buildEl.addEventListener("click", () => buildLargeGraph().catch((e) => { status.textContent = String(e); }));
  resetViewEl.addEventListener("click", resetView);
  [nodesEl, edgesEl, workersEl].forEach((input) => {
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        buildLargeGraph().catch((e) => { status.textContent = String(e); });
      }
    });
  });
  toggleEl.addEventListener("click", () => { running = !running; toggleEl.textContent = running ? "Pause" : "Resume"; });

  await buildLargeGraph();
  animate();
})();
</script>
</body>
</html>
