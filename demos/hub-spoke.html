<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grapheon - Hub and Spoke (Worker + WebGL)</title>
  <style>
    body { margin: 0; font-family: "Avenir Next", "Segoe UI", sans-serif; background: #f8fafc; }
    .wrap { display: grid; grid-template-columns: 290px 1fr; height: 100vh; }
    .controls { background: #fff; border-right: 1px solid #e2e8f0; padding: 16px; }
    .controls h1 { margin: 0 0 10px; font-size: 1.05rem; }
    .controls label { font-size: 0.82rem; color: #334155; display: block; margin-top: 10px; }
    .controls input, .controls button { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; margin-top: 4px; }
    .controls button { border: none; background: #0284c7; color: #fff; font-weight: 700; cursor: pointer; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .hint { margin-top: 10px; font-size: 0.8rem; color: #64748b; }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
<div class="wrap">
  <aside class="controls">
    <h1>Hub-and-Spoke</h1>
    <label>Leaf Nodes <input id="leafCount" type="number" value="30000" min="1000" max="180000" step="1000"></label>
    <label>Workers <input id="workers" type="number" value="30" min="1" max="64" step="1"></label>
    <div class="row">
      <button id="rebuild">Rebuild</button>
      <button id="pause">Pause</button>
    </div>
    <div class="hint" id="status">ready</div>
  </aside>
  <main><canvas id="canvas" width="1280" height="800"></canvas></main>
</div>

<script>
(async () => {
  const status = document.getElementById("status");
  if (window.location.protocol === "file:") {
    status.textContent = "Open via local server: python3 -m http.server 8080 then http://localhost:8080/demos/hub-spoke.html";
    return;
  }

  let ForceGraphWorkerClient, ForceGraphWorkerPoolClient, WebGLForceGraphRenderer, CanvasPanZoomController;
  try {
    ({ ForceGraphWorkerClient, ForceGraphWorkerPoolClient, WebGLForceGraphRenderer, CanvasPanZoomController } = await import("../dist/index.js"));
  } catch {
    status.textContent = "dist/index.js not found. Run: npm run build from repo root.";
    return;
  }

  const canvas = document.getElementById("canvas");
  const renderer = new WebGLForceGraphRenderer(canvas);
  const leafCountEl = document.getElementById("leafCount");
  const workersEl = document.getElementById("workers");
  const rebuildEl = document.getElementById("rebuild");
  const pauseEl = document.getElementById("pause");
  const initialScale = 0.8;
  const camera = new CanvasPanZoomController(canvas, {
    initialScale,
    initialOffsetX: canvas.width / (2 * initialScale),
    initialOffsetY: canvas.height / (2 * initialScale),
    minScale: 0.04,
    maxScale: 10,
  });

  let engine = null;
  let running = true;
  let last = performance.now();
  function isExpectedTermination(error) {
    return String(error).includes("Worker terminated");
  }

  async function createEngine() {
    if (engine) engine.terminate();
    const wc = Math.max(1, Number(workersEl.value) || 1);
    engine = wc === 1 ? new ForceGraphWorkerClient() : new ForceGraphWorkerPoolClient(wc);
    await engine.init({ repulsionStrength: 22, springLength: 8, springStrength: 0.03, damping: 0.92, theta: 1 });
  }

  function makeData(leafCount) {
    const nodeCount = leafCount + 1;
    const edgeCount = leafCount + Math.floor(leafCount / 8);
    const positions = new Float32Array(nodeCount * 2);
    positions[0] = 0;
    positions[1] = 0;

    for (let i = 1; i < nodeCount; i += 1) {
      const angle = (i / leafCount) * Math.PI * 2;
      positions[i * 2] = Math.cos(angle) * 40;
      positions[i * 2 + 1] = Math.sin(angle) * 40;
    }

    const edges = new Uint32Array(edgeCount * 2);
    let k = 0;
    for (let i = 1; i < nodeCount; i += 1) {
      edges[k++] = 0;
      edges[k++] = i;
    }
    for (let i = 8; i < nodeCount; i += 8) {
      edges[k++] = i;
      edges[k++] = i - 8;
    }

    return { nodeCount, positions, edges };
  }

  async function rebuild() {
    status.textContent = "building...";
    await createEngine();
    const leafCount = Number(leafCountEl.value);
    const data = makeData(leafCount);
    const loaded = await engine.loadGraph(data.nodeCount, data.edges, data.positions);
    status.textContent = `${loaded.nodeCount.toLocaleString()} nodes loaded`;
  }

  async function frame() {
    if (running && engine) {
      try {
        const summary = await engine.step(1);
        const snapshot = await engine.snapshot(50000, 42000);
        const view = camera.getTransform();
        renderer.drawSnapshot(snapshot, {
          width: canvas.width,
          height: canvas.height,
          offsetX: view.offsetX,
          offsetY: view.offsetY,
          scale: view.scale,
          nodeRadius: 2,
          nodeColor: "#0f172a",
          edgeColor: "#0284c777",
          backgroundColor: "#f8fafc",
          drawEdges: true,
        });
        const now = performance.now();
        const frameMs = now - last;
        last = now;
        status.textContent = `workers ${workersEl.value} | active ${summary.activeNodeCount.toLocaleString()} | frame ${frameMs.toFixed(1)}ms`;
      } catch (error) {
        if (!isExpectedTermination(error)) {
          status.textContent = String(error);
        }
      }
    }
    requestAnimationFrame(frame);
  }

  rebuildEl.addEventListener("click", () => rebuild().catch((e) => { status.textContent = String(e); }));
  pauseEl.addEventListener("click", () => { running = !running; pauseEl.textContent = running ? "Pause" : "Resume"; });

  await rebuild();
  frame();
})();
</script>
</body>
</html>
