<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Grapheon - Hub and Spoke</title>
<style>
:root { --panel:#f9fcfb; --line:#d4e3de; --ink:#16332b; --muted:#5f766f; --accent:#0f766e; --canvas:#e5f3ef; } *{box-sizing:border-box} html,body{height:100%} body{margin:0;overflow:hidden;font-family:"Avenir Next","Segoe UI",sans-serif;color:var(--ink);background:linear-gradient(180deg,#f6fffd 0%,#e7f4f0 100%)} .layout{display:grid;grid-template-columns:360px 1fr;height:100vh;min-height:0}.panel{overflow:auto;min-height:0;padding:18px;border-right:1px solid var(--line);background:rgba(249,252,251,.96)} h1{margin:0 0 6px;font-size:1.15rem}.sub{margin:0 0 16px;color:var(--muted);font-size:.86rem;line-height:1.4}.section{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)} .section h2{margin:0 0 10px;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;color:#23584d}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px} label{display:block;font-size:.8rem;color:#334155} input,select,button{width:100%;margin-top:4px;padding:9px 10px;border-radius:10px;border:1px solid #c2d9d2;background:#fff;color:var(--ink)} input[type="checkbox"]{width:auto;margin:0 8px 0 0} button{cursor:pointer;border:none;font-weight:700;background:linear-gradient(135deg,var(--accent),#115e59);color:#fff} button.secondary{background:#e6f1ee;color:var(--ink);border:1px solid #cdded9}.row-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.toggle{display:flex;align-items:center;margin-top:12px;font-size:.82rem}.status{margin-top:14px;padding:12px;border-radius:12px;background:#edf7f4;color:var(--muted);font-size:.82rem;min-height:64px;line-height:1.45}.viewport{min-width:0;min-height:0;height:100%;background:radial-gradient(circle at top,#f8fffe,var(--canvas))} canvas{width:100%;height:100%;display:block} @media (max-width:960px){body{overflow:auto}.layout{grid-template-columns:1fr;height:auto;min-height:100vh}.panel{border-right:none;border-bottom:1px solid var(--line);max-height:45vh}.viewport{min-height:55vh;height:55vh}}
</style></head>
<body><div class="layout"><aside class="panel">
<h1>Hub-and-Spoke</h1><p class="sub">A star graph with cross-links. Use the left dock to tune layout forces and visual style.</p>
<div class="section"><h2>Graph</h2><div class="grid"><label>Leaf Nodes <input id="leafCount" type="number" value="30000" min="1000" max="180000" step="1000"></label><label>Workers <input id="workers" type="number" value="30" min="1" max="64" step="1"></label><label>Render Mode <select id="renderDimension"><option value="2d">2D</option><option value="3d" selected>3D</option></select></label><label>Projection <select id="projection"><option value="perspective">Perspective</option><option value="orthographic">Orthographic</option></select></label><label>Camera Distance <input id="cameraDistance" type="number" value="1200" step="50"></label></div></div>
<div class="section"><h2>Physics</h2><div class="grid"><label>Repulsion <input id="repulsion" type="number" value="22" step="1"></label><label>Spring Length <input id="springLength" type="number" value="8" step="0.5"></label><label>Spring Strength <input id="springStrength" type="number" value="0.03" step="0.005"></label><label>Gravity <input id="gravity" type="number" value="0.003" step="0.001"></label><label>Damping <input id="damping" type="number" value="0.92" step="0.01"></label><label>Theta <input id="theta" type="number" value="1" step="0.05"></label><label>Max Speed <input id="maxSpeed" type="number" value="6" step="0.2"></label><label>Gravity Mode <select id="gravityMode"><option value="center">Center</option><option value="directional">Directional</option><option value="both">Both</option></select></label></div></div>
<div class="section"><h2>Style</h2><div class="grid"><label>Node Size <input id="nodeRadius" type="number" value="2" step="0.2"></label><label>Edge Width <input id="edgeWidth" type="number" value="1" step="0.2"></label><label>Node Color <input id="nodeColor" type="color" value="#0f172a"></label><label>Edge Color <input id="edgeColor" type="color" value="#0284c7"></label><label>Background <input id="backgroundColor" type="color" value="#f8fafc"></label><label>Node Shape <select id="nodeShape"><option value="circle">Circle</option><option value="square">Square</option><option value="diamond">Diamond</option><option value="triangle">Triangle</option></select></label><label>Max Draw Nodes <input id="maxDrawNodes" type="number" value="50000" step="1000"></label><label>Max Draw Edges <input id="maxDrawEdges" type="number" value="42000" step="1000"></label></div><label class="toggle"><input id="drawEdges" type="checkbox" checked>Draw edges</label></div>
<div class="row-buttons"><button id="rebuild">Rebuild</button><button class="secondary" id="pause">Pause</button><button class="secondary" id="resetView">Reset View</button><button class="secondary" id="applyView">Apply View</button></div>
<div class="status" id="status">ready</div></aside><main class="viewport"><canvas id="canvas"></canvas></main></div>
<script>
(async()=>{const $=(id)=>document.getElementById(id),status=$("status");if(location.protocol==="file:"){status.textContent="Open via local server: python3 -m http.server 8080 then http://localhost:8080/demos/hub-spoke.html";return}let ForceGraphWorkerClient,ForceGraphWorkerPoolClient,CanvasPanZoomController,renderSnapshotToCanvas;try{({ForceGraphWorkerClient,ForceGraphWorkerPoolClient,CanvasPanZoomController}=await import("../dist/index.js"));({renderSnapshotToCanvas}=await import("./snapshotRenderer.js"))}catch{status.textContent="dist/index.js not found. Run: npm run build";return}const canvas=$("canvas"),ctx=canvas.getContext("2d"),initialView={scale:.8,rotationX:-.45,rotationY:.55,rotationZ:0};if(!ctx){status.textContent="2D canvas unavailable";return}let engine=null,running=true,last=performance.now();function resizeCanvas(){const rect=canvas.getBoundingClientRect();canvas.width=Math.max(1,Math.floor(rect.width*devicePixelRatio));canvas.height=Math.max(1,Math.floor(rect.height*devicePixelRatio))}resizeCanvas();addEventListener("resize",resizeCanvas);const camera=new CanvasPanZoomController(canvas,{minScale:.04,maxScale:10,initialScale:initialView.scale,initialRotationX:initialView.rotationX,initialRotationY:initialView.rotationY,initialRotationZ:initialView.rotationZ});function resetView(){camera.setTransform({scale:initialView.scale,offsetX:canvas.width/(2*initialView.scale),offsetY:canvas.height/(2*initialView.scale),rotationX:initialView.rotationX,rotationY:initialView.rotationY,rotationZ:initialView.rotationZ})}resetView();const num=(id)=>Number($(id).value),renderDimension=()=>$("renderDimension").value,simulationOptions=()=>({repulsionStrength:num("repulsion"),springLength:num("springLength"),springStrength:num("springStrength"),gravity:num("gravity"),damping:num("damping"),theta:num("theta"),maxSpeed:num("maxSpeed"),gravityMode:$("gravityMode").value}),drawOptions=()=>{const view=camera.getTransform();return{width:canvas.width,height:canvas.height,offsetX:view.offsetX,offsetY:view.offsetY,scale:view.scale,renderDimension:renderDimension(),rotationX:view.rotationX,rotationY:view.rotationY,rotationZ:view.rotationZ,projection:$("projection").value,cameraDistance:num("cameraDistance"),nodeRadius:num("nodeRadius"),nodeColor:$("nodeColor").value,nodeShape:$("nodeShape").value,edgeColor:$("edgeColor").value+"77",edgeWidth:num("edgeWidth"),backgroundColor:$("backgroundColor").value,maxDrawNodes:num("maxDrawNodes"),maxDrawEdges:num("maxDrawEdges"),drawEdges:$("drawEdges").checked}},isExpectedTermination=(error)=>String(error).includes("Worker terminated");async function createEngine(){if(engine)engine.terminate();const wc=Math.max(1,num("workers")||1);engine=wc===1?new ForceGraphWorkerClient():new ForceGraphWorkerPoolClient(wc);await engine.init(simulationOptions())}function makeData(leafCount){const nodeCount=leafCount+1,edgeCount=leafCount+Math.floor(leafCount/8),positions=new Float32Array(nodeCount*3),is2d=renderDimension()==="2d";for(let i=1;i<nodeCount;i+=1){const angle=(i/leafCount)*Math.PI*2;positions[i*3]=Math.cos(angle)*40;positions[i*3+1]=Math.sin(angle)*40;positions[i*3+2]=is2d?0:Math.sin(angle*4)*12}const edges=new Uint32Array(edgeCount*2);let k=0;for(let i=1;i<nodeCount;i+=1){edges[k++]=0;edges[k++]=i}for(let i=8;i<nodeCount;i+=8){edges[k++]=i;edges[k++]=i-8}return{nodeCount,positions,edges}}async function rebuild(){status.textContent="building...";await createEngine();const data=makeData(num("leafCount")),loaded=await engine.loadGraph(data.nodeCount,data.edges,data.positions);status.textContent=`${loaded.nodeCount.toLocaleString()} nodes loaded`}async function frame(){if(running&&engine){try{const summary=await engine.step(1),snapshot=await engine.snapshot(num("maxDrawNodes"),num("maxDrawEdges"));renderSnapshotToCanvas(ctx,snapshot,drawOptions());const now=performance.now();status.textContent=`workers ${num("workers")} | active ${summary.activeNodeCount.toLocaleString()} | frame ${(now-last).toFixed(1)}ms`;last=now}catch(error){if(!isExpectedTermination(error))status.textContent=String(error)}}requestAnimationFrame(frame)}$("rebuild").addEventListener("click",()=>rebuild().catch((e)=>{status.textContent=String(e)}));$("pause").addEventListener("click",()=>{running=!running;$("pause").textContent=running?"Pause":"Resume"});$("resetView").addEventListener("click",resetView);$("applyView").addEventListener("click",()=>{status.textContent="style and view changes apply immediately."});$("renderDimension").addEventListener("change",()=>{resetView();rebuild().catch((e)=>{status.textContent=String(e)})});await rebuild();frame()})();
</script></body></html>
